<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #0a66c2;
      --ink: #0f172a;
      --muted: #475569;
      --surface: rgba(255, 255, 255, 0.92);
      --border: rgba(148, 163, 184, 0.28);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(10, 102, 194, 0.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.08), transparent 42%),
        linear-gradient(135deg, #f8fbff 0%, #eef4fb 100%);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    .card {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
      backdrop-filter: blur(14px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(10, 102, 194, 0.08);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 0.88rem;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .button:hover { transform: translateY(-1px); }
    .button.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 24px rgba(10, 102, 194, 0.22);
    }
    .button.secondary {
      color: var(--ink);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
    }
    .meta {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
      word-break: break-all;
    }
    code {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">LinkedIn Connection</span>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>

    {% if details %}
    <div class="meta">
      <div><strong>Details:</strong> {{ details }}</div>
    </div>
    {% endif %}

    {% if name or author_urn or expires_readable %}
    <div class="meta">
      {% if name %}<div><strong>Name:</strong> {{ name }}</div>{% endif %}
      {% if expires_readable %}<div><strong>Expires In:</strong> {{ expires_readable }}</div>{% endif %}
    </div>
    {% endif %}

    <div class="actions">
      <a class="button primary" href="{{ login_url }}">{{ action_label }}</a>
    </div>
  </main>
</body>
</html>
